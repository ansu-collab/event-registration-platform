version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: reg_platform_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-regpassword}
      POSTGRES_DB: ${POSTGRES_DB:-registration_platform}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-reguser}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: reg_platform_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-reguser}:${POSTGRES_PASSWORD:-regpassword}@postgres:5432/${POSTGRES_DB:-registration_platform}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      PORT: 3001
      EVENT_START_DATE: ${EVENT_START_DATE:-2026-07-01}
    ports:
      - '3001:3001'

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: reg_platform_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - '3000:3000'

volumes:
  postgres_data:
