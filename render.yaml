services:
  - type: web
    name: event-registration-backend
    runtime: node
    rootDir: apps/backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: event-registration-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: PORT
        value: 3001
      - key: EVENT_START_DATE
        value: 2026-07-01
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: event-registration-db
    databaseName: registration_platform
    plan: free
